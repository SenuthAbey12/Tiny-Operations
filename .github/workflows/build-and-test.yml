name: Build and Test Tiny Compiler

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make flex bison libfl-dev

    - name: Build the C Project
      run: |
        mkdir -p bin
        make clean
        make

    - name: Run Tests
      run: |
        python3 run_tests.py
